<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GFL.CLOUD | Artisan Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&family=Syne:wght@800&family=Outfit:wght@100;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2fe; --violet: #7117ea; --accent: #ff00cc; --gold: #ffd700;
            --bg: #030303; --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; height: 100vh;
        }

        /* --- CUSTOM CURSOR --- */
        #cursor {
            width: 20px; height: 20px; background: #fff; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 99999;
            mix-blend-mode: difference; transition: transform 0.1s;
        }

        /* --- DYNAMIC BACKGROUND --- */
        .ambient-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(0, 242, 254, 0.15) 0%, transparent 50%);
        }

        /* --- PORTAL BERANDA (NO LOGIN) --- */
        #home-portal {
            position: fixed; inset: 0; z-index: 5000;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            transition: 1.5s cubic-bezier(0.9, 0, 0.1, 1);
        }

        .hero-text {
            font-family: 'Syne', sans-serif; font-size: 12vw; line-height: 0.8;
            text-transform: uppercase; letter-spacing: -8px;
            background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* --- MAIN APP INTERFACE --- */
        #main-app { display: none; height: 100vh; width: 100%; opacity: 0; transition: 1s; }
        
        .sidebar {
            width: 100px; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 40px 0;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); z-index: 100;
        }

        .profile-zone {
            width: 60px; height: 60px; border-radius: 50%; padding: 3px;
            background: linear-gradient(45deg, var(--neon), var(--accent));
            margin-bottom: 60px; transition: 0.5s;
        }
        .profile-zone img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }

        .nav-link {
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 25px; border-radius: 15px; transition: 0.4s; color: #555; font-size: 1.2rem;
        }
        .nav-link:hover, .nav-link.active { background: #fff; color: #000; transform: scale(1.1); }

        /* --- VIEWPORT --- */
        .viewport { flex: 1; padding: 60px; overflow-y: auto; scroll-behavior: smooth; }
        
        .header-glass {
            background: var(--glass); border: 1px solid var(--border); padding: 40px;
            border-radius: 40px; backdrop-filter: blur(30px); margin-bottom: 60px;
        }

        .ultra-input {
            width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--border);
            color: #fff; font-size: 2rem; font-family: 'Outfit'; font-weight: 100;
            padding: 10px 0; transition: 0.5s; margin-bottom: 30px;
        }
        .ultra-input:focus { border-color: var(--neon); }

        /* --- GRID ARTISAN --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; }
        
        .card {
            background: #000; border-radius: 50px; overflow: hidden; position: relative;
            border: 1px solid var(--border); transition: 0.7s cubic-bezier(0.2, 1, 0.2, 1);
            animation: cardReveal 1s both;
        }
        @keyframes cardReveal { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .card:hover { transform: scale(1.02); border-color: #fff; }

        .media-container { width: 100%; height: 450px; overflow: hidden; background: #111; }
        .media-container img, .media-container video { 
            width: 100%; height: 100%; object-fit: cover; transition: 1s; 
        }
        .card:hover img { transform: scale(1.1) rotate(1deg); filter: brightness(0.7); }

        .card-info {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 40px;
            background: linear-gradient(to top, #000 20%, transparent);
            transform: translateY(20px); opacity: 0; transition: 0.5s;
        }
        .card:hover .card-info { transform: translateY(0); opacity: 1; }

        .btn-download {
            background: #fff; color: #000; padding: 15px 30px; border-radius: 50px;
            font-weight: 900; border: none; font-size: 0.8rem; letter-spacing: 1px;
            text-transform: uppercase; margin-top: 15px; width: 100%;
        }

        /* --- VIEWER --- */
        #viewer {
            position: fixed; inset: 0; z-index: 20000; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px);
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="ambient-bg"></div>

    <div id="home-portal">
        <div style="text-align: center;" onclick="revealApp()">
            <p style="letter-spacing: 15px; font-weight: 200; margin-bottom: 20px; opacity: 0.5;">ARCHIVE SYSTEM</p>
            <h1 class="hero-text">GFL<br>CLOUD</h1>
            <div style="margin-top: 40px; width: 2px; height: 80px; background: linear-gradient(to bottom, #fff, transparent); margin: 40px auto; animation: scrollDown 2s infinite;"></div>
            <p style="font-family: 'Outfit'; font-weight: 100; letter-spacing: 5px; cursor: pointer;">CLICK TO UNFOLD</p>
        </div>
    </div>

    <div id="main-app">
        <div class="sidebar">
            <div class="profile-zone" onclick="document.getElementById('up-p').click()">
                <img src="https://via.placeholder.com/150" id="avatar">
                <input type="file" id="up-p" hidden onchange="saveAvatar(event)">
            </div>
            <div class="nav-link active" onclick="filter('All')">✦</div>
            <div class="nav-link" onclick="filter('Image')">📸</div>
            <div class="nav-link" onclick="filter('Video')">🎬</div>
            <div class="nav-link" onclick="filter('Link')">⚡</div>
        </div>

        <div class="viewport">
            <div class="header-glass">
                <input type="text" id="title-in" class="ultra-input" placeholder="Title of your masterpiece...">
                <div style="display: flex; gap: 20px; align-items: center;">
                    <select id="quality-in" style="background:none; border:1px solid var(--border); color:#fff; padding:10px 20px; border-radius:50px;">
                        <option value="ULTRA RAW 8K">ULTRA RAW 8K</option>
                        <option value="MASTER 4K">MASTER 4K</option>
                    </select>
                    <button onclick="document.getElementById('file-in').click()" style="background:var(--neon); border:none; padding:12px 30px; border-radius:50px; font-weight:900;">+ SOURCE</button>
                    <button onclick="bypass()" style="background:none; border:1px solid var(--neon); color:var(--neon); padding:12px 30px; border-radius:50px; font-weight:900;">BYPASS LINK</button>
                    <input type="file" id="file-in" hidden onchange="upload(event)">
                </div>
            </div>

            <div class="grid" id="main-grid"></div>
        </div>
    </div>

    <div id="viewer" onclick="this.style.display='none'"><div id="v-body"></div></div>

    <script>
        let db, current = 'All';

        // Initialize Database
        const request = indexedDB.open('GFL_V9_ARTISAN', 1);
        request.onupgradeneeded = e => {
            const d = e.target.result;
            d.createObjectStore('media', {keyPath: 'id'});
            d.createObjectStore('config', {keyPath: 'key'});
        };
        request.onsuccess = e => { 
            db = e.target.result; 
            render(); 
            loadProfile();
        };

        // Custom Cursor & Ambient Logic
        document.addEventListener('mousemove', e => {
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            document.body.style.setProperty('--x', (e.clientX / window.innerWidth * 100) + '%');
            document.body.style.setProperty('--y', (e.clientY / window.innerHeight * 100) + '%');
        });

        function revealApp() {
            const h = document.getElementById('home-portal');
            const m = document.getElementById('main-app');
            h.style.transform = 'translateY(-100%)';
            m.style.display = 'flex';
            setTimeout(() => m.style.opacity = '1', 100);
        }

        // Upload Logic dengan Kualitas Maksimal
        function upload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = ev => {
                const data = {
                    id: Date.now(),
                    title: document.getElementById('title-in').value || file.name,
                    type: file.type.includes('video') ? 'Video' : 'Image',
                    blob: ev.target.result,
                    quality: document.getElementById('quality-in').value
                };
                db.transaction('media', 'readwrite').objectStore('media').add(data).onsuccess = render;
            };
            reader.readAsDataURL(file);
        }

        function bypass() {
            const url = document.getElementById('title-in').value;
            if(!url.includes('http')) return alert("Enter URL first");
            const data = {
                id: Date.now(), title: "Stream Source", type: 'Link',
                blob: url, quality: document.getElementById('quality-in').value
            };
            db.transaction('media', 'readwrite').objectStore('media').add(data).onsuccess = render;
        }

        function render() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            db.transaction('media').objectStore('media').getAll().onsuccess = e => {
                e.target.result.filter(i => current === 'All' || i.type === current).forEach((item, idx) => {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.style.animationDelay = `${idx * 0.1}s`;
                    
                    let content = item.type === 'Image' ? `<img src="${item.blob}">` : 
                                 (item.type === 'Video' ? `<video src="${item.blob}" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>` : `<div style="height:100%; display:flex; align-items:center; justify-content:center; font-size:4rem;">🔗</div>`);

                    el.innerHTML = `
                        <div class="media-container" onclick="view('${item.blob}', '${item.type}')">${content}</div>
                        <div class="card-info">
                            <span style="color:var(--gold); font-size:0.7rem; font-weight:800;">${item.quality}</span>
                            <h2 style="font-family:'Syne'; font-size:1.5rem; margin:5px 0;">${item.title}</h2>
                            <button class="btn-download" onclick="download(${item.id})">Download Source</button>
                        </div>
                    `;
                    grid.appendChild(el);
                });
            };
        }

        // Kualitas Tinggi Download: Mengonversi Base64 ke Blob asli
        function download(id) {
            db.transaction('media').objectStore('media').get(id).onsuccess = e => {
                const item = e.target.result;
                if(item.type === 'Link') return window.open(`https://savefrom.net/?url=${item.blob}`, '_blank');
                
                const link = document.createElement('a');
                link.href = item.blob;
                link.download = `GFL_ULTRA_${item.title}`;
                link.click();
            };
        }

        function filter(c) {
            current = c;
            render();
        }

        function saveAvatar(e) {
            const reader = new FileReader();
            reader.onload = ev => {
                document.getElementById('avatar').src = ev.target.result;
                db.transaction('config', 'readwrite').objectStore('config').put({key: 'avatar', val: ev.target.result});
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function loadProfile() {
            db.transaction('config').objectStore('config').get('avatar').onsuccess = e => {
                if(e.target.result) document.getElementById('avatar').src = e.target.result.val;
            };
        }

        function view(src, type) {
            const v = document.getElementById('viewer');
            const b = document.getElementById('v-body');
            v.style.display = 'flex';
            if(type === 'Image') b.innerHTML = `<img src="${src}" style="max-width:95vw; max-height:90vh; border-radius:20px;">`;
            else if(type === 'Video') b.innerHTML = `<video src="${src}" controls autoplay style="max-width:95vw; max-height:90vh; border-radius:20px;"></video>`;
            else b.innerHTML = `<iframe src="${src}" style="width:95vw; height:90vh; border:none; border-radius:20px; background:#fff;"></iframe>`;
        }
    </script>
</body>
</html>
