<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFL.CLOUD | Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --panel: #0a0a0a; --accent: #fff; --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; cursor: crosshair; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar System */
        .sidebar { width: 240px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 15px; }
        .logo { font-weight: 800; font-size: 1.2rem; margin-bottom: 40px; text-align: center; letter-spacing: 2px; color: var(--accent); }
        
        .cat-group { display: flex; flex-direction: column; gap: 8px; }
        .cat-item { 
            padding: 12px 20px; border-radius: 10px; font-size: 0.8rem; font-weight: 600; 
            color: #555; transition: 0.3s; text-transform: uppercase;
        }
        .cat-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .cat-item.active { background: #fff; color: #000; }

        /* Main System */
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 30px 50px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        
        .input-box {
            background: transparent; border: none; font-size: 1.8rem; font-weight: 800;
            color: #fff; width: 100%; margin-bottom: 20px; outline: none;
        }
        .controls { display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; border: none; transition: 0.2s; }
        .btn-p { background: #fff; color: #000; }
        .btn-s { background: transparent; color: #fff; border: 1px solid var(--border); }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }

        /* Grid System */
        .content { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: #fff; transform: translateY(-5px); }
        .card-media { width: 100%; height: 300px; background: #111; overflow: hidden; }
        .card-media img, .card-media video { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 20px; }
        .card-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 10px; }
        
        /* Viewer */
        #viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 1000; }

        /* Custom Scroll */
        .content::-webkit-scrollbar { width: 5px; }
        .content::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">GFL.CLOUD</div>
        <nav class="cat-group">
            <div class="cat-item active" onclick="filterData('All', this)">All Collection</div>
            <div class="cat-item" onclick="filterData('Image', this)">Images</div>
            <div class="cat-item" onclick="filterData('Video', this)">Videos</div>
        </nav>
    </aside>

    <main class="main">
        <header class="header">
            <input type="text" id="title-in" class="input-box" placeholder="What's the title?">
            <div class="controls">
                <button class="btn btn-p" onclick="document.getElementById('file-in').click()">+ UPLOAD SOURCE</button>
                <input type="file" id="file-in" hidden onchange="handleFile(event)">
                <div style="background: #111; padding: 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; border: 1px solid var(--border);">ULTRA RAW 8K</div>
            </div>
        </header>

        <section class="content">
            <div class="grid" id="main-grid"></div>
        </section>
    </main>

    <div id="viewer" onclick="this.style.display='none'"><div id="v-content"></div></div>

    <script>
        let db, currentFilter = 'All';

        const request = indexedDB.open('GFL_ULTIMATE_V12', 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore('assets', {keyPath: 'id'});
        request.onsuccess = e => { db = e.target.result; renderGrid(); };

        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = ev => {
                const item = {
                    id: Date.now(),
                    title: document.getElementById('title-in').value || file.name,
                    type: file.type.includes('video') ? 'Video' : 'Image',
                    src: ev.target.result
                };
                db.transaction('assets', 'readwrite').objectStore('assets').add(item).onsuccess = renderGrid;
            };
            reader.readAsDataURL(file);
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            db.transaction('assets').objectStore('assets').getAll().onsuccess = e => {
                const data = e.target.result.filter(i => currentFilter === 'All' || i.type === currentFilter);
                data.reverse().forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'card';
                    const media = item.type === 'Image' ? `<img src="${item.src}">` : `<video src="${item.src}" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>`;
                    el.innerHTML = `
                        <div class="card-media" onclick="openView('${item.src}', '${item.type}')">${media}</div>
                        <div class="card-info">
                            <p class="card-title">${item.title}</p>
                            <button class="btn btn-s" style="width:100%" onclick="downloadAsset(${item.id})">GET SOURCE</button>
                        </div>
                    `;
                    grid.appendChild(el);
                });
            };
        }

        function filterData(f, el) {
            currentFilter = f;
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            renderGrid();
        }

        function openView(src, type) {
            const v = document.getElementById('viewer');
            const c = document.getElementById('v-content');
            v.style.display = 'flex';
            c.innerHTML = type === 'Image' ? `<img src="${src}" style="max-width:90vw; max-height:90vh; border-radius:10px;">` : `<video src="${src}" controls autoplay style="max-width:90vw; max-height:90vh; border-radius:10px;"></video>`;
        }

        function downloadAsset(id) {
            db.transaction('assets').objectStore('assets').get(id).onsuccess = e => {
                const item = e.target.result;
                const link = document.createElement('a');
                link.href = item.src;
                link.download = `GFL_${item.title}`;
                link.click();
            };
        }
    </script>
</body>
</html>
