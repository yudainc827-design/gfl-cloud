<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFL.CLOUD | Art Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; cursor: none; }
        
        body {
            background: #050505;
            color: #fff;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Animated Background Canvas */
        #bg-canvas {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        }

        /* Custom Cursor */
        #cursor {
            width: 8px; height: 8px; background: var(--primary); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            box-shadow: 0 0 15px var(--primary); transition: transform 0.1s;
        }

        /* Glass Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 40px 20px;
            z-index: 10;
        }

        .brand {
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 60px; text-align: center;
        }

        .nav-link {
            padding: 18px 25px; border-radius: 15px; margin-bottom: 10px;
            font-size: 0.85rem; font-weight: 600; color: #888;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 15px;
            border: 1px solid transparent;
        }
        .nav-link:hover { color: #fff; background: var(--glass); transform: translateX(10px); }
        .nav-link.active { 
            color: #fff; background: var(--glass); border-color: var(--primary);
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1);
        }

        /* Main Workspace */
        .workspace { flex: 1; display: flex; flex-direction: column; position: relative; }

        .top-nav {
            padding: 40px 60px; display: flex; flex-direction: column; gap: 30px;
        }

        .input-hero {
            background: transparent; border: none; font-size: 2.5rem;
            font-weight: 800; color: #fff; outline: none;
            font-family: 'Syne', sans-serif;
        }
        .input-hero::placeholder { color: rgba(255,255,255,0.05); }

        .action-row { display: flex; gap: 15px; align-items: center; }

        .btn-neon {
            padding: 12px 28px; border-radius: 30px; font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
            border: 1px solid var(--primary); background: transparent; color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }
        .btn-neon:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); }

        /* Artistic Grid */
        .scroll-container { flex: 1; overflow-y: auto; padding: 0 60px 60px; }
        .art-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
        }

        .art-card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 24px; padding: 15px; transition: 0.5s;
            position: relative; overflow: hidden;
        }
        .art-card:hover { transform: translateY(-15px) scale(1.02); border-color: var(--secondary); }

        .media-box {
            width: 100%; height: 400px; border-radius: 18px; overflow: hidden;
            background: #000; margin-bottom: 20px;
        }
        .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .art-card:hover img { transform: scale(1.1); filter: saturate(1.5); }

        .card-meta { display: flex; justify-content: space-between; align-items: center; }
        .card-info h4 { font-family: 'Syne', sans-serif; font-size: 1.1rem; }
        .card-info p { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 1px; }

        .dl-icon {
            width: 45px; height: 45px; background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #000; font-weight: 800; transition: 0.3s;
        }
        .dl-icon:hover { background: var(--primary); transform: rotate(90deg); }

        /* Custom Scrollbar */
        .scroll-container::-webkit-scrollbar { width: 4px; }
        .scroll-container::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="cursor"></div>

    <aside class="sidebar">
        <div class="brand">GFL.CLOUD</div>
        <nav>
            <div class="nav-link active" onclick="changeF('All', this)"><span>✦</span> ALL ARCHIVE</div>
            <div class="nav-link" onclick="changeF('Image', this)"><span>📸</span> VISUAL ARTS</div>
            <div class="nav-link" onclick="changeF('Video', this)"><span>🎬</span> CINEMATICS</div>
        </nav>
    </aside>

    <main class="workspace">
        <header class="top-nav">
            <input type="text" id="t-input" class="input-hero" placeholder="Name your masterpiece...">
            <div class="action-row">
                <button class="btn-neon" onclick="document.getElementById('f-upload').click()">+ IMPORT SOURCE</button>
                <input type="file" id="f-upload" hidden onchange="process(event)">
                <div style="font-size: 0.6rem; color: #444; font-weight: 800;">ENCRYPTED STORAGE ACTIVE</div>
            </div>
        </header>

        <section class="scroll-container">
            <div class="art-grid" id="art-grid"></div>
        </section>
    </main>

    <script>
        let db, currentFilter = 'All';

        // Background Animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];

        function initBG() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            pts = [];
            for(let i=0; i<50; i++) pts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:Math.random()-0.5, vy:Math.random()-0.5});
        }

        function drawBG() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 242, 255, 0.1)";
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx *= -1;
                if(p.y<0 || p.y>canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(drawBG);
        }
        initBG(); drawBG();

        // Database
        const req = indexedDB.open('GFL_ART_V13', 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('v13', {keyPath:'id'});
        req.onsuccess = e => { db = e.target.result; render(); };

        // Mouse
        document.addEventListener('mousemove', e => {
            const c = document.getElementById('cursor');
            c.style.left = e.clientX + 'px';
            c.style.top = e.clientY + 'px';
        });

        function process(e) {
            const file = e.target.files[0];
            const rd = new FileReader();
            rd.onload = ev => {
                const item = {
                    id: Date.now(),
                    title: document.getElementById('t-input').value || "Untitled Art",
                    type: file.type.includes('video') ? 'Video' : 'Image',
                    data: ev.target.result
                };
                db.transaction('v13', 'readwrite').objectStore('v13').add(item).onsuccess = render;
            };
            rd.readAsDataURL(file);
        }

        function render() {
            const grid = document.getElementById('art-grid');
            grid.innerHTML = '';
            db.transaction('v13').objectStore('v13').getAll().onsuccess = e => {
                e.target.result.filter(i => currentFilter === 'All' || i.type === currentFilter).reverse().forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'art-card';
                    const media = item.type === 'Image' ? `<img src="${item.data}">` : `<video src="${item.data}" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>`;
                    div.innerHTML = `
                        <div class="media-box">${media}</div>
                        <div class="card-meta">
                            <div class="card-info">
                                <p>${item.type}</p>
                                <h4>${item.title}</h4>
                            </div>
                            <div class="dl-icon" onclick="dl(${item.id})">↓</div>
                        </div>
                    `;
                    grid.appendChild(div);
                });
            };
        }

        function changeF(f, el) {
            currentFilter = f;
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function dl(id) {
            db.transaction('v13').objectStore('v13').get(id).onsuccess = e => {
                const i = e.target.result;
                const a = document.createElement('a'); a.href = i.data; a.download = i.title; a.click();
            };
        }
    </script>
</body>
</html>
